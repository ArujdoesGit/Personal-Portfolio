<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — Galaxy</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <canvas id="canvas"></canvas>

  <!-- Header -->
  <div id="header">
    <h1>Your Name</h1>
    <p>Drag to explore &nbsp;·&nbsp; Click a planet to open a project</p>
  </div>

  <!-- Hover tooltip -->
  <div id="tooltip"></div>

  <!-- Project detail panel -->
  <div id="panel" class="panel">
    <button id="panel-close">✕</button>
    <span id="panel-emoji"></span>
    <h2 id="panel-title"></h2>
    <p id="panel-desc"></p>
    <div id="panel-tags"></div>
    <a id="panel-link" href="#" target="_blank" rel="noopener">View Project →</a>
  </div>

  <!-- Hint -->
  <div id="hint">scroll to zoom</div>

  <!-- ── Renekton contact button ───────────────────────── -->
  <div id="rocket-wrap">
    <div id="ren-portrait">
      <img src="https://ddragon.leagueoflegends.com/cdn/14.8.1/img/champion/Renekton.png" alt="Renekton" id="ren-img"/>
      <div id="ren-eyes"></div>
      <div id="ren-blade">⚔️</div>
    </div>
    <span class="rocket-label">Say hi!</span>
  </div>

  <!-- ── Contact modal ───────────────────────────────── -->
  <div id="contact-modal">
    <button id="contact-close">✕</button>
    <h2 class="contact-title">Send a Message 🚀</h2>
    <form id="contact-form" novalidate>
      <input  type="text"  name="from_name"  placeholder="Your name"    required />
      <input  type="email" name="from_email" placeholder="Your email"   required />
      <textarea             name="message"   placeholder="What's up?" rows="4" required></textarea>
      <button type="submit" id="send-btn">Launch it <span class="btn-rocket">🚀</span></button>
    </form>
  </div>

  <!-- ── Success toast ───────────────────────────────── -->
  <div id="success-toast">Message delivered to the stars ✨</div>

  <!-- EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>emailjs.init('YOUR_PUBLIC_KEY');</script>
  <script src="contact.js"></script>

  <script type="importmap">
  {
    "imports": {
      "three":          "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="main.js"></script>

</body>
</html>
